on: [push, pull_request]

jobs:
  frontend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Install dependencies
        run: pnpm --prefix=frontend install

      - name: Tests
        run: pnpm --prefix=frontend vitest -- --run

  backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Install dependencies
        run: pnpm --prefix=backend install

      - name: Compile backend
        run: pnpm --prefix=backend exec tsc

      - name: Start backend
        run: node ./backend/dist/server.js &

      - name: Waiting for start
        run: pnpm --prefix=backend exec wait-on http://localhost:8000 --timeout 10000

      - name: Tests
        run: pnpm --prefix=backend vitest -- --run

  deploy:
    runs-on: ubuntu-24.04
    needs: [backend, frontend]

    steps:
      - name: sshing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: touch /root/file.txt
